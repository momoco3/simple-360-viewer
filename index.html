<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360 Viewer</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: sans-serif;
      background: #111;
      color: #fff;
      overflow: hidden;
    }

    #panorama {
      width: 100%;
      height: 100%;
      background: #000;
    }

    #dropZone {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      padding: 14px 18px;
      border: 2px dashed rgba(255,255,255,0.6);
      border-radius: 12px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(6px);
      color: white;
      font-size: 14px;
      line-height: 1.6;
      transition: 0.2s ease;
      user-select: none;
    }

    #dropZone.dragover {
      background: rgba(50, 200, 255, 0.22);
      border-color: #32c8ff;
      box-shadow: 0 0 0 4px rgba(50, 200, 255, 0.15);
    }

    #dropZone strong {
      display: block;
      font-size: 15px;
      margin-bottom: 2px;
    }

    #fileInput {
      display: none;
    }

    #dropZone button {
      margin-top: 8px;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #32c8ff;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    #dropZone button:hover {
      opacity: 0.9;
    }

    @media (max-width: 640px) {
      #dropZone {
        top: 10px;
        left: 10px;
        right: 10px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div id="dropZone">
    <strong>ここに画像を入れる</strong>
    画像をドラッグ＆ドロップしてください
    <br>
    または
    <br>
    <button type="button" onclick="document.getElementById('fileInput').click()">
      画像を選ぶ
    </button>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div id="panorama"></div>

  <script>
    let viewer = null;

    function createViewer(imagePath) {
      if (viewer) {
        viewer.destroy();
      }

      viewer = pannellum.viewer('panorama', {
        type: 'equirectangular',
        panorama: imagePath,
        autoLoad: true,
        showZoomCtrl: true,
        showFullscreenCtrl: true,
        compass: false,
        pitch: 0,
        yaw: 0,
        hfov: 100
      });
    }

    function loadFromFile(file) {
      if (!file || !file.type.startsWith('image/')) {
        alert('画像ファイルを入れてください');
        return;
      }

      const imageUrl = URL.createObjectURL(file);
      createViewer(imageUrl);
    }

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');

      const file = e.dataTransfer.files[0];
      loadFromFile(file);
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      loadFromFile(file);
    });

    // 初期表示画像
    createViewer('panorama.jpg');
  </script>
</body>
</html>
